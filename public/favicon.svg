<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4AF37;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bgGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1e;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <g transform="translate(256, 256)">
    <circle cx="0" cy="0" r="220" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.3"/>
    <circle cx="0" cy="0" r="200" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.2"/>
    
    <path d="M -180,0 L -160,10 L -180,20 Z M 180,0 L 160,10 L 180,20 Z M 0,-180 L 10,-160 L 20,-180 Z M 0,180 L 10,160 L 20,180 Z" 
          fill="url(#goldGradient)" opacity="0.4"/>
  </g>
  
  <text x="256" y="320" 
        font-family="'Amiri', 'Traditional Arabic', 'Arabic Typesetting', serif" 
        font-size="140" 
        font-weight="bold"
        text-anchor="middle" 
        fill="url(#goldGradient)"
        filter="url(#glow)"
        style="text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);">نِبْرَاس</text>
  
  <g transform="translate(256, 256)" opacity="0.15">
    <path d="M -150,-150 L -140,-140 M 150,-150 L 140,-140 M -150,150 L -140,140 M 150,150 L 140,140" 
          stroke="url(#goldGradient)" stroke-width="3" stroke-linecap="round"/>
  </g>
</svg>
